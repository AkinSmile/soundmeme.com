<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик сердечек ❤️ (GitHub Issues)</title>
    <style>
        /* Стили остаются без изменений (как в прошлом коде) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        h1 span {
            color: #ff4d4d;
        }
        
        .counter {
            font-size: 72px;
            font-weight: bold;
            margin: 20px;
            color: #ff4d4d;
            text-shadow: 2px 2px 4px rgba(255,77,77,0.3);
            transition: all 0.3s ease;
        }
        
        .heart-image {
            cursor: pointer;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: block;
            transition: all 0.3s ease;
            filter: drop-shadow(0 5px 15px rgba(255,77,77,0.4));
        }
        
        .heart-image:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 8px 20px rgba(255,77,77,0.6));
        }
        
        .heart-image:active {
            transform: scale(0.9);
        }
        
        .heart-image.heartbeat {
            animation: heartbeat 0.3s ease;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.2); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .counter.heartbeat-text {
            animation: textPop 0.3s ease;
        }
        
        @keyframes textPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        
        .message {
            margin-top: 30px;
            color: #666;
            font-size: 18px;
            font-style: italic;
        }
        
        .message span {
            color: #ff4d4d;
            font-weight: bold;
        }
        
        .github-badge {
            margin-top: 10px;
            font-size: 14px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .github-badge.loading {
            color: #ff9800;
        }
        
        .github-badge.error {
            color: #f44336;
        }
        
        .info-text {
            margin-top: 5px;
            font-size: 12px;
            color: #999;
        }
    </style>
    <script src="config.js"></script>
</head>
<body>
    <div class="container">
        <h1>
            Счётчик <span>❤️</span> Сердечек
        </h1>
        
        <div class="counter" id="counter">0</div>
        
        <svg class="heart-image" id="heartImage" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5C22 12.27 18.6 15.36 13.45 20.03L12 21.35Z" 
                  fill="#ff4d4d" 
                  stroke="#ff4d4d" 
                  stroke-width="1"/>
        </svg>
        
        <div class="message">
            <p>Кликай на сердечко - <span>я люблю тебя</span> ❤️</p>
        </div>
        
        <div class="github-badge" id="githubBadge">
            🐙 GitHub счётчик
        </div>
        <div class="info-text" id="infoText">
            Значение общее для всех устройств
        </div>
    </div>

    <script>
        // 🔧 ВАШИ ДАННЫЕ (исправлено!)
        const GITHUB_USERNAME = 'AkinSmile';
        const GITHUB_REPO = 'soundmeme.com';  // новое название репозитория
        const COUNTER_ISSUE_ID = 2;            // исправлено на 2!
        
        const GITHUB_TOKEN = window.MY_GITHUB_TOKEN;
        
        const counterElement = document.getElementById('counter');
        const heartImage = document.getElementById('heartImage');
        const githubBadge = document.getElementById('githubBadge');
        const infoText = document.getElementById('infoText');
        
        let heartCount = 0;
        let isLoading = false;
        
        async function loadCounter() {
            if (!GITHUB_TOKEN) {
                githubBadge.textContent = '🐙 Нет токена';
                githubBadge.className = 'github-badge error';
                return;
            }
            
            try {
                isLoading = true;
                githubBadge.textContent = '🐙 Загрузка...';
                githubBadge.className = 'github-badge loading';
                
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/issues/${COUNTER_ISSUE_ID}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }
                
                const issue = await response.json();
                
                const titleMatch = issue.title.match(/Counter: (\d+)/);
                if (titleMatch) {
                    heartCount = parseInt(titleMatch[1]);
                } else {
                    heartCount = 0;
                }
                
                updateCounter();
                githubBadge.textContent = '🐙 Загружено с GitHub';
                githubBadge.className = 'github-badge';
                infoText.textContent = `📦 Issue #${COUNTER_ISSUE_ID}`;
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                githubBadge.textContent = '🐙 Ошибка загрузки';
                githubBadge.className = 'github-badge error';
                
                const localCount = localStorage.getItem('githubHeartCounter');
                if (localCount) {
                    heartCount = parseInt(localCount);
                    updateCounter();
                    infoText.textContent = '⚠️ Режим офлайн';
                }
            } finally {
                isLoading = false;
            }
        }
        
        async function saveCounter() {
            if (isLoading || !GITHUB_TOKEN) return;
            
            try {
                githubBadge.textContent = '🐙 Сохранение...';
                githubBadge.className = 'github-badge loading';
                
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/issues/${COUNTER_ISSUE_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: `Counter: ${heartCount}`,
                        body: `Обновлено: ${new Date().toLocaleString()}`
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }
                
                githubBadge.textContent = '🐙 Сохранено ✓';
                githubBadge.className = 'github-badge';
                setTimeout(() => {
                    githubBadge.textContent = '🐙 GitHub счётчик';
                }, 2000);
                
                localStorage.setItem('githubHeartCounter', heartCount);
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                githubBadge.textContent = '🐙 Ошибка сохранения';
                githubBadge.className = 'github-badge error';
                setTimeout(() => {
                    githubBadge.textContent = '🐙 GitHub счётчик';
                    githubBadge.className = 'github-badge';
                }, 3000);
                
                localStorage.setItem('githubHeartCounter', heartCount);
            }
        }
        
        function updateCounter() {
            counterElement.textContent = heartCount;
        }
        
        function animateHeart() {
            heartImage.classList.add('heartbeat');
            setTimeout(() => {
                heartImage.classList.remove('heartbeat');
            }, 300);
            
            counterElement.classList.add('heartbeat-text');
            setTimeout(() => {
                counterElement.classList.remove('heartbeat-text');
            }, 300);
        }
        
        function createFloatingHeart(x, y) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.style.position = 'fixed';
                    heart.style.left = (x + (Math.random() - 0.5) * 50) + 'px';
                    heart.style.top = (y + (Math.random() - 0.5) * 50) + 'px';
                    heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                    heart.style.pointerEvents = 'none';
                    heart.style.zIndex = '1000';
                    heart.style.animation = `floatUp ${Math.random() * 0.5 + 0.8}s ease-out forwards`;
                    heart.style.opacity = Math.random() * 0.5 + 0.5;
                    
                    if (!document.getElementById('floatStyle')) {
                        const style = document.createElement('style');
                        style.id = 'floatStyle';
                        style.textContent = `
                            @keyframes floatUp {
                                0% {
                                    opacity: 1;
                                    transform: translateY(0) rotate(0deg);
                                }
                                100% {
                                    opacity: 0;
                                    transform: translateY(-150px) rotate(${Math.random() * 60 - 30}deg);
                                }
                            }
                        `;
                        document.head.appendChild(style);
                    }
                    
                    document.body.appendChild(heart);
                    setTimeout(() => {
                        heart.remove();
                    }, 1500);
                }, i * 70);
            }
        }
        
        heartImage.addEventListener('click', async function(e) {
            heartCount++;
            updateCounter();
            await saveCounter();
            animateHeart();
            createFloatingHeart(e.clientX, e.clientY);
        });
        
        if (GITHUB_TOKEN) {
            loadCounter();
            setInterval(() => {
                loadCounter();
            }, 10000);
        } else {
            githubBadge.textContent = '🐙 Ожидание токена...';
            githubBadge.className = 'github-badge loading';
        }
    </script>
</body>
</html>
