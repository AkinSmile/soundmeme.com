<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик сердечек ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            margin: 0;
            padding: 16px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
        }

        h1 {
            color: #e53e3e;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .counter {
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            line-height: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            
            /* Адаптивный размер текста */
            display: inline-block;
            width: 100%;
            white-space: normal;
            
            /* Базовый размер */
            font-size: 7rem;
            
            /* Плавный переход для изменения размера */
            transition: font-size 0.2s ease;
        }

        /* Динамическое изменение размера в зависимости от количества цифр */
        .counter[data-digits="5"] { font-size: 5.5rem; }
        .counter[data-digits="6"] { font-size: 4.8rem; }
        .counter[data-digits="7"] { font-size: 4rem; }
        .counter[data-digits="8"] { font-size: 3.5rem; }
        .counter[data-digits="9"] { font-size: 3rem; }
        .counter[data-digits="10"] { font-size: 2.5rem; }
        .counter[data-digits="11"] { font-size: 2.2rem; }
        .counter[data-digits="12"] { font-size: 2rem; }
        .counter[data-digits="13"] { font-size: 1.8rem; }
        .counter[data-digits="14"] { font-size: 1.6rem; }
        .counter[data-digits="15"] { font-size: 1.4rem; }
        .counter[data-digits="16"] { font-size: 1.2rem; }

        .heart-btn {
            background: none;
            border: none;
            font-size: 9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            line-height: 1;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }

        .heart-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 15px 20px rgba(229, 62, 62, 0.3));
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        .heart-btn.clicked {
            animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); color: #fc8181; }
            50% { transform: scale(1.2); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .status {
            margin-top: 25px;
            color: #4a5568;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #48bb78;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px currentColor;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .footer {
            margin-top: 20px;
            color: #718096;
            font-size: 0.9rem;
        }

        .footer a {
            color: #e53e3e;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            .counter {
                font-size: 5rem;
            }
            
            /* Адаптация для мобильных устройств */
            .counter[data-digits="5"] { font-size: 4rem; }
            .counter[data-digits="6"] { font-size: 3.5rem; }
            .counter[data-digits="7"] { font-size: 3rem; }
            .counter[data-digits="8"] { font-size: 2.5rem; }
            .counter[data-digits="9"] { font-size: 2.2rem; }
            .counter[data-digits="10"] { font-size: 2rem; }
            .counter[data-digits="11"] { font-size: 1.8rem; }
            .counter[data-digits="12"] { font-size: 1.6rem; }
            .counter[data-digits="13"] { font-size: 1.4rem; }
            .counter[data-digits="14"] { font-size: 1.2rem; }
            .counter[data-digits="15"] { font-size: 1.1rem; }
            .counter[data-digits="16"] { font-size: 1rem; }
            
            .heart-btn {
                font-size: 7rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Счётчик <span>❤️</span> Сердечек</h1>
        <div class="counter" id="counter" data-digits="1">0</div>
        <button class="heart-btn" id="heartBtn" aria-label="Поставить сердечко">❤️</button>
        <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Подключение...</span>
        </div>
        <div class="footer">
            <p>Кликай на сердечко - <span>я люблю тебя</span> ❤️</p>
        </div>
    </div>

    <!-- Подключаем Firebase -->
    <script type="module">
        // Импортируем Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDTyhxDIMFKvQKw02_kdvnZm8Tkv5z7Hys",
            authDomain: "heart-counter-33f97.firebaseapp.com",
            projectId: "heart-counter-33f97",
            storageBucket: "heart-counter-33f97.firebasestorage.app",
            messagingSenderId: "12220347799",
            appId: "1:12220347799:web:74d6e2781cd01009e100d2"
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const counterRef = ref(db, 'hearts');

        // Элементы DOM
        const counterElement = document.getElementById('counter');
        const heartBtn = document.getElementById('heartBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        // Функция для установки атрибута data-digits в зависимости от длины числа
        function setDigitsAttribute(number) {
            // Преобразуем число в строку и считаем количество цифр
            const numStr = String(number);
            const digitCount = Math.min(numStr.length, 16); // Ограничиваем до 16 для CSS
            
            // Устанавливаем атрибут data-digits
            counterElement.setAttribute('data-digits', digitCount);
        }

        // Функция обновления статуса подключения
        function updateStatus(connected) {
            if (connected) {
                statusDot.style.backgroundColor = '#48bb78';
                statusText.textContent = 'Все устройства синхронизированы';
            } else {
                statusDot.style.backgroundColor = '#f56565';
                statusText.textContent = 'Ожидание подключения...';
            }
        }

        // Слушаем изменения счётчика
        onValue(counterRef, (snapshot) => {
            const value = snapshot.val();
            const displayValue = value !== null ? value : 0;
            
            // Форматируем число с пробелами для тысяч (опционально)
            // counterElement.textContent = displayValue.toLocaleString('ru-RU');
            
            // Или просто отображаем число без форматирования
            counterElement.textContent = displayValue;
            
            // Устанавливаем атрибут для определения размера
            setDigitsAttribute(displayValue);
            
            updateStatus(true);
        }, (error) => {
            console.error('Ошибка:', error);
            updateStatus(false);
        });

        // Обработчик нажатия на сердечко
        heartBtn.addEventListener('click', async () => {
            // Анимация
            heartBtn.classList.add('clicked');
            setTimeout(() => {
                heartBtn.classList.remove('clicked');
            }, 400);

            // Обновляем счётчик в Firebase
            try {
                await runTransaction(counterRef, (currentValue) => {
                    return (currentValue || 0) + 1;
                });
            } catch (error) {
                console.error('Ошибка обновления:', error);
                statusText.textContent = 'Ошибка синхронизации';
            }
        });

        // Инициализация счётчика
        runTransaction(counterRef, (currentValue) => {
            return currentValue !== null ? currentValue : 0;
        });
    </script>
</body>
</html>
