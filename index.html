<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик сердечек ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        h1 span {
            color: #ff4d4d;
        }
        
        .counter {
            font-size: 72px;
            font-weight: bold;
            margin: 20px;
            color: #ff4d4d;
            text-shadow: 2px 2px 4px rgba(255,77,77,0.3);
            transition: all 0.3s ease;
        }
        
        .heart-image {
            cursor: pointer;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            display: block;
            transition: all 0.3s ease;
            filter: drop-shadow(0 5px 15px rgba(255,77,77,0.4));
        }
        
        .heart-image:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 8px 20px rgba(255,77,77,0.6));
        }
        
        .heart-image:active {
            transform: scale(0.9);
        }
        
        .heart-image.heartbeat {
            animation: heartbeat 0.3s ease;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.2); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .counter.heartbeat-text {
            animation: textPop 0.3s ease;
        }
        
        @keyframes textPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        
        .message {
            margin-top: 30px;
            color: #666;
            font-size: 18px;
            font-style: italic;
        }
        
        .message span {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Счётчик <span>❤️</span> Сердечек
        </h1>
        
        <div class="counter" id="counter">0</div>
        
        <!-- Картинка с сердечком в формате SVG -->
        <svg class="heart-image" id="heartImage" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5C22 12.27 18.6 15.36 13.45 20.03L12 21.35Z" 
                  fill="#ff4d4d" 
                  stroke="#ff4d4d" 
                  stroke-width="1"/>
        </svg>
        
        <div class="message">
            <p>Кликай на сердечко - <span>я люблю тебя</span> ❤️</p>
        </div>
    </div>

    <script>
        // Получаем элементы
        const counterElement = document.getElementById('counter');
        const heartImage = document.getElementById('heartImage');
        
        // Переменная для счётчика
        let heartCount = 0;
        
        // Функция обновления счётчика
        function updateCounter() {
            counterElement.textContent = heartCount;
        }
        
        // Функция анимации
        function animateHeart() {
            // Анимация сердечка
            heartImage.classList.add('heartbeat');
            setTimeout(() => {
                heartImage.classList.remove('heartbeat');
            }, 300);
            
            // Анимация текста
            counterElement.classList.add('heartbeat-text');
            setTimeout(() => {
                counterElement.classList.remove('heartbeat-text');
            }, 300);
        }
        
        // Функция для создания плавающих сердечек
        function createFloatingHeart(x, y) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1000';
            heart.style.animation = `floatUp ${Math.random() * 0.5 + 0.8}s ease-out forwards`;
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            
            // Добавляем стиль для анимации
            if (!document.getElementById('floatStyle')) {
                const style = document.createElement('style');
                style.id = 'floatStyle';
                style.textContent = `
                    @keyframes floatUp {
                        0% {
                            opacity: 1;
                            transform: translateY(0) rotate(0deg);
                        }
                        100% {
                            opacity: 0;
                            transform: translateY(-150px) rotate(${Math.random() * 60 - 30}deg);
                        }
                    }
                `;
                document.head.appendChild(style);
            }
            
            document.body.appendChild(heart);
            
            // Удаляем сердечко
            setTimeout(() => {
                heart.remove();
            }, 1500);
        }
        
        // Обработчик клика
        heartImage.addEventListener('click', function(e) {
            // Увеличиваем счётчик
            heartCount++;
            
            // Обновляем отображение
            updateCounter();
            
            // Анимация
            animateHeart();
            
            // Создаём 3 сердечка при клике
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFloatingHeart(
                        e.clientX + (Math.random() - 0.5) * 50,
                        e.clientY + (Math.random() - 0.5) * 50
                    );
                }, i * 50);
            }
        });
    </script>
</body>
</html>
